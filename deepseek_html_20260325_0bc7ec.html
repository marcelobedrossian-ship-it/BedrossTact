<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#1a2c3e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Sail Droid PWA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
    <div class="container">
        <header>
            <h1>⚓ SAIL DROID PWA</h1>
            <div class="gps-status" id="gpsStatus">Buscando GPS...</div>
        </header>

        <div class="dashboard">
            <div class="speed-card card">
                <div class="card-label">VELOCIDAD</div>
                <div class="card-value" id="speed">--.-</div>
                <div class="card-unit">nudos</div>
            </div>
            
            <div class="course-card card">
                <div class="card-label">RUMBO (COG)</div>
                <div class="card-value" id="course">---°</div>
                <div class="card-unit">grados</div>
            </div>
            
            <div class="position-card card">
                <div class="card-label">POSICIÓN</div>
                <div class="card-value-small" id="lat">--° --.----</div>
                <div class="card-value-small" id="lon">--° --.----</div>
            </div>
        </div>

        <div class="target-card card">
            <div class="card-label">OBJETIVO</div>
            <div class="target-info" id="targetInfo">
                <span id="targetName">---</span>
                <span id="targetDistance">---</span>
            </div>
            <div class="target-progress" id="targetProgress">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <button class="btn-stop" id="stopNavigation">⏹️ DETENER NAVEGACIÓN</button>
        </div>

        <div class="waypoint-section">
            <div class="section-header">
                <h2>📌 WAYPOINTS</h2>
                <div class="search-box">
                    <input type="text" id="searchWpt" placeholder="🔍 Buscar waypoint..." class="search-input">
                </div>
            </div>
            
            <div class="waypoint-actions">
                <button class="btn-primary" id="addWptBtn">➕ AÑADIR ACTUAL</button>
                <button class="btn-route" id="createRouteBtn">🗺️ CREAR RUTA</button>
                <button class="btn-clear" id="clearRouteBtn">❌ LIMPIAR RUTA</button>
            </div>
            
            <div class="waypoint-list" id="waypointList">
                <div class="empty-message">No hay waypoints. Añade tu ubicación actual.</div>
            </div>
        </div>

        <div class="route-info" id="routeInfo" style="display: none;">
            <div class="route-header">
                <span>📍 RUTA ACTIVA</span>
                <span id="routeProgress">0/0</span>
            </div>
            <div class="route-list" id="routeList"></div>
        </div>

        <footer>
            <div class="footer-stats">
                <span>📡 SAT: <span id="satellites">0</span></span>
                <span>🎯 PRECISIÓN: <span id="accuracy">0</span>m</span>
            </div>
            <div class="footer-version">v1.0 | PWA | Sin conexión</div>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
